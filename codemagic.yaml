workflows:
  build-wda:
    name: Build WebDriverAgent
    instance_type: mac_mini_m2
    environment:
      node: latest
    scripts:
      - name: Install Appium
        script: |
          npm install -g appium
          appium driver install xcuitest@9.5.0
      - name: Build WDA
        script: |
          WDA=$(find ~/.appium -name "WebDriverAgent.xcodeproj" -exec dirname {} \; | head -1)
          cd "$WDA"
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination "generic/platform=iOS" \
            -derivedDataPath /tmp/wda \
            CODE_SIGNING_ALLOWED=NO
      - name: Package IPA
        script: |
          cd /tmp/wda/Build/Products/Debug-iphoneos
          mkdir -p Payload
          cp -r WebDriverAgentRunner-Runner.app Payload/
          zip -r WDA-iOS26.ipa Payload/
    artifacts:
      - /tmp/wda/Build/Products/Debug-iphoneos/WDA-iOS26.ipa
